<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Réinitialiser mot de passe</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c5e 0%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 45px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #1a3c5e;
            text-align: center;
            margin-bottom: 5px;
        }
        .logo span { color: #f0a500; }
        .tagline {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 12px;
            padding: 13px 15px;
            border: 2px solid #e9ecef;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #1a3c5e;
            box-shadow: none;
        }
        .form-label {
            font-weight: 600;
            color: #1a3c5e;
        }
        .input-group-text {
            border-radius: 12px 0 0 12px;
            border: 2px solid #e9ecef;
            border-right: none;
            background: #f8f9fa;
            color: #1a3c5e;
        }
        .input-group .form-control {
            border-radius: 0 12px 12px 0;
            border-left: none;
        }
        .btn-reinitialiser {
            background: linear-gradient(135deg, #1a3c5e, #f0a500);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-reinitialiser:hover {
            transform: translateY(-2px);
            color: white;
        }
        .icon-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .icon-container i {
            font-size: 3rem;
            color: #1a3c5e;
        }
    </style>
</head>
<body>
<div class="card">

    <div class="logo">Banka<span>GN</span></div>
    <div class="tagline">Votre banque numérique en Guinée</div>

    <div class="icon-container">
        <i class="bi bi-key"></i>
    </div>

    <h5 class="text-center fw-bold mb-2" style="color:#1a3c5e;">
        Nouveau mot de passe
    </h5>
    <p class="text-center text-muted small mb-4">
        Choisissez un nouveau mot de passe
        sécurisé pour votre compte.
    </p>

    <!-- Alertes -->
    <div th:if="${erreur}"
         class="alert alert-danger rounded-3 mb-3"
         style="font-size:0.9rem;"
         th:text="${erreur}">
    </div>

    <form th:action="@{/auth/reinitialiser}"
          method="post">

        <input type="hidden"
               name="token"
               th:value="${token}">

        <div class="mb-3">
            <label class="form-label">
                <i class="bi bi-lock me-1"></i>
                Nouveau mot de passe
            </label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>
                <input type="password"
                       name="nouveauMotDePasse"
                       class="form-control"
                       placeholder="Minimum 6 caractères"
                       minlength="6"
                       required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label">
                <i class="bi bi-lock-fill me-1"></i>
                Confirmer le mot de passe
            </label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-lock-fill"></i>
                </span>
                <input type="password"
                       name="confirmerMotDePasse"
                       class="form-control"
                       placeholder="Répétez le mot de passe"
                       minlength="6"
                       required>
            </div>
        </div>

        <button type="submit" class="btn-reinitialiser">
            <i class="bi bi-check-circle me-2"></i>
            Réinitialiser mon mot de passe
        </button>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
