<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-image:
                    linear-gradient(135deg,
                    rgba(26, 60, 94, 0.88) 0%,
                    rgba(13, 33, 55, 0.92) 100%),
                    url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, #1a3c5e, #f0a500);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px 15px;
            border: 2px solid #e9ecef;
        }
        .form-control:focus {
            border-color: #1a3c5e;
            box-shadow: none;
        }
        .logo-text {
            font-size: 2rem;
            font-weight: 800;
            color: #1a3c5e;
        }
        .logo-text span {
            color: #f0a500;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5">

                <!-- Logo -->
                <div class="text-center mb-4">
                    <div class="logo-text">
                        Banka<span>GN</span>
                    </div>
                    <p class="text-muted mt-2">
                        Votre banque numérique en Guinée
                    </p>
                </div>

                <!-- Alerte erreur -->
                <div th:if="${erreur}"
                     class="alert alert-danger rounded-3"
                     th:text="${erreur}">
                </div>

                <!-- Alerte succès -->
                <div th:if="${succes}"
                     class="alert alert-success rounded-3"
                     th:text="${succes}">
                </div>

                <!-- Formulaire -->
                <form th:action="@{/auth/login}" method="post">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-envelope me-1"></i>
                            Email
                        </label>
                        <input type="email"
                               name="username"
                               class="form-control"
                               placeholder="votre@email.com"
                               required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            <i class="bi bi-lock me-1"></i>
                            Mot de passe
                        </label>
                        <input type="password"
                               name="password"
                               class="form-control"
                               placeholder="••••••••"
                               required>
                    </div>

                    <button type="submit"
                            class="btn btn-primary w-100 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>
                        Se connecter
                    </button>

                    <div class="text-center">
                        <span class="text-muted">
                            Pas encore de compte ?
                        </span>
                        <a th:href="@{/auth/register}"
                           class="text-decoration-none fw-semibold"
                           style="color: #1a3c5e;">
                            S'inscrire
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
