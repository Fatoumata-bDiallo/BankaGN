<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Vérification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c5e 0%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 45px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #1a3c5e;
            text-align: center;
            margin-bottom: 5px;
        }
        .logo span { color: #f0a500; }
        .tagline {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .icon-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .icon-container i {
            font-size: 3.5rem;
            color: #1a3c5e;
        }
        .otp-input {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 15px;
            border-radius: 15px;
            border: 3px solid #e9ecef;
            padding: 15px;
            color: #1a3c5e;
            width: 100%;
        }
        .otp-input:focus {
            border-color: #f0a500;
            box-shadow: 0 0 0 0.2rem rgba(240,165,0,0.25);
            outline: none;
        }
        .btn-verifier {
            background: linear-gradient(135deg, #1a3c5e, #f0a500);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s;
            margin-top: 15px;
        }
        .btn-verifier:hover {
            transform: translateY(-2px);
            color: white;
        }
        .timer {
            text-align: center;
            color: #dc3545;
            font-weight: 600;
            font-size: 0.9rem;
            margin-top: 15px;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #1a3c5e;
            font-weight: 600;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link a:hover { color: #f0a500; }
        .email-badge {
            background: #f0f4f8;
            border-radius: 10px;
            padding: 8px 15px;
            text-align: center;
            color: #1a3c5e;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="card">

    <div class="logo">Banka<span>GN</span></div>
    <div class="tagline">Votre banque numérique en Guinée</div>

    <div class="icon-container">
        <i class="bi bi-shield-lock"></i>
    </div>

    <h5 class="text-center fw-bold mb-2" style="color:#1a3c5e;">
        Vérification en 2 étapes
    </h5>
    <p class="text-center text-muted small mb-3">
        Un code de vérification a été envoyé sur votre email
    </p>

    <div class="email-badge">
        <i class="bi bi-envelope me-1"></i>
        <span th:text="${email}"></span>
    </div>

    <!-- Alertes -->
    <div th:if="${erreur}"
         class="alert alert-danger rounded-3 mb-3"
         style="font-size:0.9rem;"
         th:text="${erreur}">
    </div>

    <form th:action="@{/auth/otp}" method="post">

        <div class="mb-3">
            <label class="form-label fw-semibold text-center
                          d-block" style="color:#1a3c5e;">
                Entrez votre code à 6 chiffres
            </label>
            <input type="text"
                   name="code"
                   class="otp-input"
                   placeholder="••••••"
                   maxlength="6"
                   pattern="[0-9]{6}"
                   autocomplete="one-time-code"
                   autofocus
                   required>
        </div>

        <button type="submit" class="btn-verifier">
            <i class="bi bi-shield-check me-2"></i>
            Vérifier le code
        </button>
    </form>

    <div class="timer">
        <i class="bi bi-clock me-1"></i>
        Code valable : <span id="timer">05:00</span>
    </div>

    <div class="back-link">
        <a href="/auth/login">
            <i class="bi bi-arrow-left me-1"></i>
            Retour à la connexion
        </a>
    </div>
</div>

<script>
    // Compte à rebours 5 minutes
    let timeLeft = 300;
    const timerEl = document.getElementById('timer');

    const countdown = setInterval(() => {
        timeLeft--;
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent =
            String(minutes).padStart(2, '0') + ':' +
            String(seconds).padStart(2, '0');

        if (timeLeft <= 60) {
            timerEl.style.color = '#dc3545';
        }

        if (timeLeft <= 0) {
            clearInterval(countdown);
            timerEl.textContent = 'Expiré !';
            document.querySelector('.btn-verifier')
                .disabled = true;
        }
    }, 1000);

    // Accepter seulement les chiffres
    document.querySelector('.otp-input')
        .addEventListener('input', function() {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
