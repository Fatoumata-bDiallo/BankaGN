<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Mot de passe oublié</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a3c5e 0%, #0d2137 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            border-radius: 25px;
            padding: 45px 40px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3);
            border: none;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            color: #1a3c5e;
            text-align: center;
            margin-bottom: 5px;
        }
        .logo span { color: #f0a500; }
        .tagline {
            text-align: center;
            color: #6c757d;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 12px;
            padding: 13px 15px;
            border: 2px solid #e9ecef;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: #1a3c5e;
            box-shadow: none;
        }
        .form-label {
            font-weight: 600;
            color: #1a3c5e;
        }
        .input-group-text {
            border-radius: 12px 0 0 12px;
            border: 2px solid #e9ecef;
            border-right: none;
            background: #f8f9fa;
            color: #1a3c5e;
        }
        .input-group .form-control {
            border-radius: 0 12px 12px 0;
            border-left: none;
        }
        .btn-envoyer {
            background: linear-gradient(135deg, #1a3c5e, #f0a500);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 700;
            width: 100%;
            transition: all 0.3s;
        }
        .btn-envoyer:hover {
            transform: translateY(-2px);
            color: white;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #1a3c5e;
            font-weight: 600;
            text-decoration: none;
        }
        .back-link a:hover {
            color: #f0a500;
        }
        .icon-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .icon-container i {
            font-size: 3rem;
            color: #f0a500;
        }
    </style>
</head>
<body>
<div class="card">

    <div class="logo">Banka<span>GN</span></div>
    <div class="tagline">Votre banque numérique en Guinée</div>

    <div class="icon-container">
        <i class="bi bi-shield-lock"></i>
    </div>

    <h5 class="text-center fw-bold mb-2" style="color:#1a3c5e;">
        Mot de passe oublié ?
    </h5>
    <p class="text-center text-muted small mb-4">
        Entrez votre email et nous vous enverrons
        un lien pour réinitialiser votre mot de passe.
    </p>

    <!-- Alertes -->
    <div th:if="${succes}"
         class="alert alert-success rounded-3 mb-3"
         style="font-size:0.9rem;"
         th:text="${succes}">
    </div>
    <div th:if="${erreur}"
         class="alert alert-danger rounded-3 mb-3"
         style="font-size:0.9rem;"
         th:text="${erreur}">
    </div>

    <form th:action="@{/auth/mot-de-passe-oublie}"
          method="post">

        <div class="mb-4">
            <label class="form-label">
                <i class="bi bi-envelope me-1"></i>
                Votre adresse email
            </label>
            <div class="input-group">
                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>
                <input type="email"
                       name="email"
                       class="form-control"
                       placeholder="votre@email.com"
                       required>
            </div>
        </div>

        <button type="submit" class="btn-envoyer">
            <i class="bi bi-send me-2"></i>
            Envoyer le lien de réinitialisation
        </button>
    </form>

    <div class="back-link mt-3">
        <a href="/auth/login">
            <i class="bi bi-arrow-left me-1"></i>
            Retour à la connexion
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
