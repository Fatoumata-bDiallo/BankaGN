<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Gestion Prêts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #0d2137 0%, #1a3c5e 100%);
            position: fixed;
            top: 0; left: 0;
            padding: 20px 0;
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .logo span { color: #f0a500; }
        .sidebar .badge-admin {
            background: #f0a500;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 10px 25px;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background: rgba(240,165,0,0.2);
            border-left: 3px solid #f0a500;
        }
        .sidebar .nav-link i { width: 25px; margin-right: 10px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .topbar {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card { border: none; border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        table th {
            background: #f8f9fa;
            color: #1a3c5e;
            font-weight: 600;
            border: none;
        }
        table td { vertical-align: middle;
            border-color: #f0f0f0; }
    </style>
</head>
<body>

<!-- Sidebar Admin -->
<div class="sidebar">
    <div class="logo">
        Banka<span>GN</span>
        <span class="badge-admin">ADMIN</span>
    </div>
    <nav class="mt-3">
        <a href="/admin/dashboard" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/admin/utilisateurs" class="nav-link">
            <i class="bi bi-people"></i> Utilisateurs
        </a>
        <a href="/admin/comptes" class="nav-link">
            <i class="bi bi-bank"></i> Comptes
        </a>
        <a href="/admin/transactions" class="nav-link">
            <i class="bi bi-arrow-left-right"></i> Transactions
        </a>
        <a href="/admin/prets" class="nav-link active">
            <i class="bi bi-cash-coin"></i> Prêts
        </a>
        <a href="/admin/fraudes" class="nav-link">
            <i class="bi bi-shield-exclamation"></i> Alertes Fraude
        </a>
        <a href="/admin/audit" class="nav-link">
            <i class="bi bi-journal-text"></i> Journal Audit
        </a>
        <a href="/admin/devises" class="nav-link">
            <i class="bi bi-currency-exchange"></i> Taux Devises
        </a>
        <a href="/admin/rapports" class="nav-link">
            <i class="bi bi-bar-chart-line"></i> Rapports
        </a>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <a href="/auth/logout" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> Déconnexion
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">

    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold" style="color:#1a3c5e;">
                💰 Gestion des Prêts
            </h5>
            <small class="text-muted">
                Validez ou refusez les demandes
            </small>
        </div>
        <span class="badge bg-warning text-dark fs-6"
              th:text="${#lists.size(prets)} + ' demandes'">
        </span>
    </div>

    <!-- Alertes -->
    <div th:if="${succes}"
         class="alert alert-success rounded-3 mb-4"
         th:text="${succes}">
    </div>
    <div th:if="${erreur}"
         class="alert alert-danger rounded-3 mb-4"
         th:text="${erreur}">
    </div>

    <div class="card">
        <div class="card-body p-4">
            <table class="table">
                <thead>
                <tr>
                    <th>Client</th>
                    <th>Référence</th>
                    <th>Montant</th>
                    <th>Durée</th>
                    <th>Mensualité</th>
                    <th>Motif</th>
                    <th>Date</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="p : ${prets}">
                    <td>
                        <strong th:text="${p.utilisateur.prenom
                                + ' ' + p.utilisateur.nom}">
                        </strong>
                    </td>
                    <td>
                        <small class="text-muted"
                               th:text="${p.reference}">
                        </small>
                    </td>
                    <td>
                        <strong th:text="${#numbers.formatDecimal(
                                p.montant, 0, 'COMMA', 0, 'POINT')
                                + ' GNF'}">
                        </strong>
                    </td>
                    <td th:text="${p.dureeMois + ' mois'}"></td>
                    <td th:text="${#numbers.formatDecimal(
                            p.mensualite, 0, 'COMMA', 0, 'POINT')
                            + ' GNF'}">
                    </td>
                    <td th:text="${p.motif}"></td>
                    <td>
                        <small th:text="${#temporals.format(
                                p.dateCreation, 'dd/MM/yyyy')}">
                        </small>
                    </td>
                    <td>
                            <span th:class="${p.statut.name() == 'ACCEPTE'} ?
                                'badge bg-success' :
                                (${p.statut.name() == 'REFUSE'} ?
                                'badge bg-danger' :
                                'badge bg-warning text-dark')"
                                  th:text="${p.statut}">
                            </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2"
                             th:if="${p.statut.name() == 'EN_ATTENTE'}">
                            <a th:href="@{/admin/prets/accepter/{id}(id=${p.id})}"
                               class="btn btn-sm btn-success"
                               onclick="return confirm('Accepter ce prêt ?')">
                                <i class="bi bi-check-circle"></i>
                            </a>
                            <a th:href="@{/admin/prets/refuser/{id}(id=${p.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Refuser ce prêt ?')">
                                <i class="bi bi-x-circle"></i>
                            </a>
                        </div>
                        <span th:if="${p.statut.name() != 'EN_ATTENTE'}"
                              class="text-muted small">
                                Traité
                            </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
