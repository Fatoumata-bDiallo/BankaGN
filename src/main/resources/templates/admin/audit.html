<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Journal Audit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #0d2137 0%, #1a3c5e 100%);
            position: fixed;
            top: 0; left: 0;
            padding: 20px 0;
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .logo span { color: #f0a500; }
        .sidebar .badge-admin {
            background: #f0a500;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 8px 25px;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background: rgba(240,165,0,0.2);
            border-left: 3px solid #f0a500;
        }
        .sidebar .nav-link i { width: 25px; margin-right: 10px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .topbar {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card { border: none; border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        table th {
            background: #f8f9fa;
            color: #1a3c5e;
            font-weight: 600;
            border: none;
        }
        table td { vertical-align: middle;
            border-color: #f0f0f0; }
        .action-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        Banka<span>GN</span>
        <span class="badge-admin">ADMIN</span>
    </div>
    <nav class="mt-3">
        <a href="/admin/dashboard" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/admin/utilisateurs" class="nav-link">
            <i class="bi bi-people"></i> Utilisateurs
        </a>
        <a href="/admin/comptes" class="nav-link">
            <i class="bi bi-bank"></i> Comptes
        </a>
        <a href="/admin/transactions" class="nav-link">
            <i class="bi bi-arrow-left-right"></i> Transactions
        </a>
        <a href="/admin/prets" class="nav-link">
            <i class="bi bi-cash-coin"></i> Prêts
        </a>
        <a href="/admin/fraudes" class="nav-link">
            <i class="bi bi-shield-exclamation"></i>
            Alertes Fraude
        </a>
        <a href="/admin/audit" class="nav-link active">
            <i class="bi bi-journal-text"></i> Journal Audit
        </a>
        <a href="/admin/devises" class="nav-link">
            <i class="bi bi-currency-exchange"></i>
            Taux Devises
        </a>
        <a href="/admin/rapports" class="nav-link">
            <i class="bi bi-bar-chart-line"></i> Rapports
        </a>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <a href="/auth/logout" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> Déconnexion
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">

    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold" style="color:#1a3c5e;">
                📋 Journal d'Audit
            </h5>
            <small class="text-muted">
                Historique de toutes les actions
            </small>
        </div>
        <span class="badge bg-primary fs-6"
              th:text="${#lists.size(journaux)}
              + ' actions'">
        </span>
    </div>

    <!-- Vide -->
    <div th:if="${journaux == null or
                  #lists.isEmpty(journaux)}">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-journal fs-1 text-muted"></i>
                <h5 class="mt-3 text-muted">
                    Aucune action enregistrée
                </h5>
                <p class="text-muted">
                    Les actions seront enregistrées
                    automatiquement !
                </p>
            </div>
        </div>
    </div>

    <!-- Tableau -->
    <div class="card"
         th:if="${journaux != null and
                  !#lists.isEmpty(journaux)}">
        <div class="card-body p-4">
            <table class="table">
                <thead>
                <tr>
                    <th>Type</th>
                    <th>Action</th>
                    <th>Détails</th>
                    <th>Effectué par</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="j : ${journaux}">
                    <td>
                        <div class="action-icon"
                             th:classappend="
                                 ${j.typeAction.name() == 'CONNEXION'} ?
                                 'bg-success bg-opacity-10 text-success' :
                                 (${j.typeAction.name() == 'TRANSACTION'} ?
                                 'bg-primary bg-opacity-10 text-primary' :
                                 (${j.typeAction.name() == 'UTILISATEUR'} ?
                                 'bg-warning bg-opacity-10 text-warning' :
                                 (${j.typeAction.name() == 'PRET'} ?
                                 'bg-purple bg-opacity-10 text-purple' :
                                 'bg-secondary bg-opacity-10 text-secondary')))">
                            <i th:class="
                                ${j.typeAction.name() == 'CONNEXION'} ?
                                'bi bi-box-arrow-in-right' :
                                (${j.typeAction.name() == 'TRANSACTION'} ?
                                'bi bi-arrow-left-right' :
                                (${j.typeAction.name() == 'UTILISATEUR'} ?
                                'bi bi-person' :
                                (${j.typeAction.name() == 'PRET'} ?
                                'bi bi-cash-coin' :
                                'bi bi-gear')))">
                            </i>
                        </div>
                    </td>
                    <td>
                        <strong th:text="${j.action}">
                        </strong>
                    </td>
                    <td>
                        <small class="text-muted"
                               th:text="${j.details}">
                        </small>
                    </td>
                    <td>
                            <span class="badge bg-light
                                         text-dark"
                                  th:text="${j.effectuePar}">
                            </span>
                    </td>
                    <td>
                        <small th:text="${#temporals.format(
                                j.dateAction,
                                'dd/MM/yyyy HH:mm')}">
                        </small>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
