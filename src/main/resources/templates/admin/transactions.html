<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Transactions Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #0d2137 0%, #1a3c5e 100%);
            position: fixed;
            top: 0; left: 0;
            padding: 20px 0;
            z-index: 100;
        }
        .sidebar .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .logo span { color: #f0a500; }
        .sidebar .badge-admin {
            background: #f0a500;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 25px;
            transition: all 0.3s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background: rgba(240,165,0,0.2);
            border-left: 3px solid #f0a500;
        }
        .sidebar .nav-link i { width: 25px; margin-right: 10px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .topbar {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        table th {
            background: #f8f9fa;
            color: #1a3c5e;
            font-weight: 600;
            border: none;
        }
        table td { vertical-align: middle; border-color: #f0f0f0; }
        .transaction-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        Banka<span>GN</span>
        <span class="badge-admin">ADMIN</span>
    </div>
    <nav class="mt-3">
        <a href="/admin/dashboard" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/admin/utilisateurs" class="nav-link">
            <i class="bi bi-people"></i> Utilisateurs
        </a>
        <a href="/admin/comptes" class="nav-link">
            <i class="bi bi-bank"></i> Comptes
        </a>
        <a href="/admin/transactions" class="nav-link active">
            <i class="bi bi-arrow-left-right"></i> Transactions
        </a>
        <a href="/admin/prets" class="nav-link">
            <i class="bi bi-cash-coin"></i> Prêts
        </a>
        <a href="/admin/fraudes" class="nav-link">
            <i class="bi bi-shield-exclamation"></i> Alertes Fraude
        </a>
        <a href="/admin/audit" class="nav-link">
            <i class="bi bi-journal-text"></i> Journal Audit
        </a>
        <a href="/admin/devises" class="nav-link">
            <i class="bi bi-currency-exchange"></i> Taux Devises
        </a>
        <a href="/admin/rapports" class="nav-link">
            <i class="bi bi-bar-chart-line"></i> Rapports
        </a>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <a href="/auth/logout" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> Déconnexion
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">

    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold" style="color:#1a3c5e;">
                📊 Toutes les Transactions
            </h5>
            <small class="text-muted">
                Historique complet de la banque
            </small>
        </div>
        <span class="badge bg-primary fs-6"
              th:text="${#lists.size(transactions)} + ' transactions'">
        </span>
    </div>

    <div class="card">
        <div class="card-body p-4">
            <table class="table">
                <thead>
                <tr>
                    <th>Type</th>
                    <th>Référence</th>
                    <th>Montant</th>
                    <th>Compte Source</th>
                    <th>Compte Dest.</th>
                    <th>Date</th>
                    <th>Statut</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${transactions}">
                    <td>
                        <div class="d-flex align-items-center gap-2">
                            <div class="transaction-icon"
                                 th:classappend="${t.type.name() == 'DEPOT'} ?
                                     'bg-success bg-opacity-10 text-success' :
                                     (${t.type.name() == 'RETRAIT'} ?
                                     'bg-danger bg-opacity-10 text-danger' :
                                     'bg-primary bg-opacity-10 text-primary')">
                                <i th:class="${t.type.name() == 'DEPOT'} ?
                                        'bi bi-arrow-down' :
                                        (${t.type.name() == 'RETRAIT'} ?
                                        'bi bi-arrow-up' :
                                        'bi bi-arrow-left-right')">
                                </i>
                            </div>
                            <span class="fw-semibold small"
                                  th:text="${t.type}">
                                </span>
                        </div>
                    </td>
                    <td>
                        <small class="text-muted"
                               th:text="${t.reference}">
                        </small>
                    </td>
                    <td>
                        <strong th:class="${t.type.name() == 'DEPOT'} ?
                                'text-success' : 'text-danger'"
                                th:text="${#numbers.formatDecimal(
                                    t.montant, 0, 'COMMA', 0, 'POINT') +
                                    ' GNF'}">
                        </strong>
                    </td>
                    <td>
                        <small th:text="${t.compteSource != null ?
                                t.compteSource.numeroCompte : '-'}">
                        </small>
                    </td>
                    <td>
                        <small th:text="${t.compteDestination != null ?
                                t.compteDestination.numeroCompte : '-'}">
                        </small>
                    </td>
                    <td>
                        <small th:text="${#temporals.format(
                                t.dateTransaction,
                                'dd/MM/yyyy HH:mm')}">
                        </small>
                    </td>
                    <td>
                            <span th:class="${t.statut.name() == 'SUCCES'} ?
                                'badge bg-success' : 'badge bg-danger'"
                                  th:text="${t.statut}">
                            </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
