<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Gestion Comptes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .sidebar {
            width: 260px;
            min-height: 100vh;
            background: linear-gradient(180deg, #0d2137 0%, #1a3c5e 100%);
            position: fixed;
            top: 0; left: 0;
            padding: 20px 0;
            z-index: 100;
        }
        .sidebar .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .logo span { color: #f0a500; }
        .sidebar .badge-admin {
            background: #f0a500;
            color: white;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 10px;
            margin-left: 8px;
        }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 12px 25px;
            transition: all 0.3s;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background: rgba(240,165,0,0.2);
            border-left: 3px solid #f0a500;
        }
        .sidebar .nav-link i { width: 25px; margin-right: 10px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .topbar {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        table th {
            background: #f8f9fa;
            color: #1a3c5e;
            font-weight: 600;
            border: none;
        }
        table td { vertical-align: middle; border-color: #f0f0f0; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">
        Banka<span>GN</span>
        <span class="badge-admin">ADMIN</span>
    </div>
    <nav class="mt-3">
        <a href="/admin/dashboard" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/admin/utilisateurs" class="nav-link">
            <i class="bi bi-people"></i> Utilisateurs
        </a>
        <a href="/admin/comptes" class="nav-link active">
            <i class="bi bi-bank"></i> Comptes
        </a>
        <a href="/admin/transactions" class="nav-link">
            <i class="bi bi-arrow-left-right"></i> Transactions
        </a>
        <a href="/admin/prets" class="nav-link">
            <i class="bi bi-cash-coin"></i> Prêts
        </a>
        <a href="/admin/fraudes" class="nav-link">
            <i class="bi bi-shield-exclamation"></i> Alertes Fraude
        </a>
        <a href="/admin/audit" class="nav-link">
            <i class="bi bi-journal-text"></i> Journal Audit
        </a>
        <a href="/admin/devises" class="nav-link">
            <i class="bi bi-currency-exchange"></i> Taux Devises
        </a>
        <a href="/admin/rapports" class="nav-link">
            <i class="bi bi-bar-chart-line"></i> Rapports
        </a>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <a href="/auth/logout" class="nav-link text-danger">
            <i class="bi bi-box-arrow-left"></i> Déconnexion
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">

    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold" style="color:#1a3c5e;">
                🏦 Gestion des Comptes
            </h5>
            <small class="text-muted">
                Tous les comptes bancaires
            </small>
        </div>
        <span class="badge bg-primary fs-6"
              th:text="${#lists.size(comptes)} + ' comptes'">
        </span>
    </div>

    <!-- Alertes -->
    <div th:if="${succes}"
         class="alert alert-success rounded-3 mb-4"
         th:text="${succes}">
    </div>

    <div class="card">
        <div class="card-body p-4">
            <table class="table">
                <thead>
                <tr>
                    <th>Numéro</th>
                    <th>Type</th>
                    <th>Titulaire</th>
                    <th>Solde</th>
                    <th>Date ouverture</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="c : ${comptes}">
                    <td>
                        <strong th:text="${c.numeroCompte}"></strong>
                    </td>
                    <td>
                            <span th:class="${c.type.name() == 'COURANT'} ?
                                'badge bg-primary' : 'badge bg-success'"
                                  th:text="${c.type}">
                            </span>
                    </td>
                    <td th:text="${c.utilisateur.prenom +
                            ' ' + c.utilisateur.nom}">
                    </td>
                    <td>
                        <strong th:text="${#numbers.formatDecimal(
                                c.solde, 0, 'COMMA', 0, 'POINT') + ' GNF'}">
                        </strong>
                    </td>
                    <td th:text="${#temporals.format(
                            c.dateCreation, 'dd/MM/yyyy')}">
                    </td>
                    <td>
                            <span th:class="${c.statut.name() == 'ACTIF'} ?
                                'badge bg-success' : 'badge bg-danger'"
                                  th:text="${c.statut}">
                            </span>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a th:if="${c.statut.name() == 'ACTIF'}"
                               th:href="@{/admin/comptes/bloquer/{id}(id=${c.id})}"
                               class="btn btn-sm btn-danger"
                               onclick="return confirm('Bloquer ce compte ?')">
                                <i class="bi bi-lock"></i>
                            </a>
                            <a th:if="${c.statut.name() == 'BLOQUE'}"
                               th:href="@{/admin/comptes/debloquer/{id}(id=${c.id})}"
                               class="btn btn-sm btn-success">
                                <i class="bi bi-unlock"></i>
                            </a>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
