<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankaGN - Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; }
        .sidebar {
            width: 260px;
            height: 100vh;
            background: linear-gradient(180deg, #1a3c5e 0%, #0d2137 100%);
            position: fixed;
            top: 0; left: 0;
            padding: 20px 0;
            z-index: 100;
            overflow-y: auto;
        }
        .sidebar .logo {
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .logo span { color: #f0a500; }
        .sidebar .nav-link {
            color: rgba(255,255,255,0.7);
            padding: 8px 25px;
            transition: all 0.3s;
            font-size: 0.85rem;
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background: rgba(240,165,0,0.2);
            border-left: 3px solid #f0a500;
        }
        .sidebar .nav-link i { width: 25px; margin-right: 10px; }
        .main-content { margin-left: 260px; padding: 30px; }
        .topbar {
            background: white;
            border-radius: 15px;
            padding: 15px 25px;
            margin-bottom: 25px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card { border: none; border-radius: 15px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .notif-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: flex-start;
            gap: 15px;
            transition: background 0.2s;
        }
        .notif-item:hover { background: #f8f9fa; }
        .notif-item:last-child { border-bottom: none; }
        .notif-item.non-lue {
            background: #fff8e1;
            border-left: 4px solid #f0a500;
        }
        .notif-icon {
            width: 50px;
            height: 50px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }
    </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">
    <div class="logo">Banka<span>GN</span></div>
    <nav class="mt-3">
        <a href="/client/dashboard" class="nav-link">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>
        <a href="/client/comptes" class="nav-link">
            <i class="bi bi-bank"></i> Mes Comptes
        </a>
        <a href="/client/transactions" class="nav-link">
            <i class="bi bi-arrow-left-right"></i> Transactions
        </a>
        <a href="/client/cartes" class="nav-link">
            <i class="bi bi-credit-card"></i> Mes Cartes
        </a>
        <a href="/client/prets" class="nav-link">
            <i class="bi bi-cash-coin"></i> Prêts
        </a>
        <a href="/client/beneficiaires" class="nav-link">
            <i class="bi bi-people"></i> Bénéficiaires
        </a>
        <a href="/client/releves" class="nav-link">
            <i class="bi bi-file-pdf"></i> Relevés PDF
        </a>
        <a href="/client/devises" class="nav-link">
            <i class="bi bi-currency-exchange"></i> Devises
        </a>
        <a href="/client/notifications" class="nav-link active">
            <i class="bi bi-bell"></i> Notifications
        </a>
        <hr style="border-color: rgba(255,255,255,0.1);">
        <a href="/auth/logout" class="nav-link text-danger"
           style="position:sticky;bottom:0;background:#0d2137;">
            <i class="bi bi-box-arrow-left"></i> Déconnexion
        </a>
    </nav>
</div>

<!-- Main Content -->
<div class="main-content">

    <div class="topbar">
        <div>
            <h5 class="mb-0 fw-bold" style="color:#1a3c5e;">
                🔔 Mes Notifications
            </h5>
            <small class="text-muted">
                Toutes vos alertes bancaires
            </small>
        </div>
        <span class="badge bg-primary fs-6"
              th:text="${#lists.size(notifications)}
              + ' notifications'">
        </span>
    </div>

    <!-- Vide -->
    <div th:if="${notifications == null or
                  #lists.isEmpty(notifications)}">
        <div class="card">
            <div class="card-body text-center py-5">
                <i class="bi bi-bell-slash fs-1 text-muted"></i>
                <h5 class="mt-3 text-muted">
                    Aucune notification
                </h5>
            </div>
        </div>
    </div>

    <!-- Liste -->
    <div class="card"
         th:if="${notifications != null and
                  !#lists.isEmpty(notifications)}">
        <div class="card-body p-0">
            <div th:each="n : ${notifications}"
                 th:class="${!n.lu} ?
                 'notif-item non-lue' : 'notif-item'">

                <!-- Icône selon type -->
                <div class="notif-icon"
                     th:classappend="${n.type != null and
                     n.type.name() == 'DEPOT'} ?
                     'bg-success bg-opacity-10 text-success' :
                     (${n.type != null and
                     n.type.name() == 'RETRAIT'} ?
                     'bg-danger bg-opacity-10 text-danger' :
                     (${n.type != null and
                     n.type.name() == 'TRANSFERT'} ?
                     'bg-primary bg-opacity-10 text-primary' :
                     (${n.type != null and
                     n.type.name() == 'PRET'} ?
                     'bg-warning bg-opacity-10 text-warning' :
                     'bg-secondary bg-opacity-10 text-secondary')))">
                    <i th:class="${n.type != null and
                        n.type.name() == 'DEPOT'} ?
                        'bi bi-arrow-down-circle' :
                        (${n.type != null and
                        n.type.name() == 'RETRAIT'} ?
                        'bi bi-arrow-up-circle' :
                        (${n.type != null and
                        n.type.name() == 'TRANSFERT'} ?
                        'bi bi-arrow-left-right' :
                        (${n.type != null and
                        n.type.name() == 'PRET'} ?
                        'bi bi-cash-coin' :
                        'bi bi-bell')))">
                    </i>
                </div>

                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between">
                        <div class="fw-bold"
                             th:text="${n.titre}">
                        </div>
                        <small class="text-muted"
                               th:text="${#temporals.format(
                               n.dateCreation,
                               'dd/MM/yyyy HH:mm')}">
                        </small>
                    </div>
                    <div class="text-muted small mt-1"
                         th:text="${n.message}">
                    </div>
                </div>

                <!-- Badge non lue -->
                <div th:if="${!n.lu}">
                    <span class="badge bg-warning
                                 text-dark rounded-pill">
                        Nouveau
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
